name: Deploy COOP FE App

on:
  push:
    branches: ['dev']

  pull_request:
    branches: ['dev']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_URL_API: ${{ secrets.VITE_BASE_URL_API }}
